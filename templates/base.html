<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}M2M Planner{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Top nav --- */
    .topnav {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      height: 3.25rem;
      gap: 2rem;
      flex-shrink: 0;
    }

    .topnav .brand {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
      text-decoration: none;
      letter-spacing: -.02em;
    }
    .topnav .brand span { color: #38bdf8; }

    .topnav nav { display: flex; gap: .25rem; }

    .topnav nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      padding: .4rem .75rem;
      border-radius: .375rem;
      transition: all .15s;
    }
    .topnav nav a:hover {
      color: #e2e8f0;
      background: #334155;
    }
    .topnav nav a.active {
      color: #38bdf8;
      background: rgba(56, 189, 248, .1);
    }

    /* --- Page content --- */
    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    /* --- Shared card --- */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <header class="topnav">
    <a class="brand" href="{% url 'home' %}">M2M <span>Planner</span></a>
    <nav>
      <a href="{% url 'home' %}" class="{% block nav_home %}{% endblock %}">Home</a>
      <a href="{% url 'daily_expensable' %}" class="{% block nav_expensable %}{% endblock %}">Daily Expensable</a>
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
